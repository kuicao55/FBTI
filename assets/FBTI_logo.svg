<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="50%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  
  <!-- 外圈装饰环 -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGrad)" stroke="#1A1A1A" stroke-width="6"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- 中心餐叉造型（F 的抽象化） -->
  <g transform="translate(100, 85)">
    <!-- 叉柄 -->
    <line x1="0" y1="15" x2="0" y2="45" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- 叉齿 -->
    <line x1="-18" y1="-10" x2="-18" y2="15" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="-6" y1="-15" x2="-6" y2="15" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="6" y1="-15" x2="6" y2="15" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="18" y1="-10" x2="18" y2="15" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- 叉齿间的连接弧 -->
    <path d="M-18 -10 Q-12 -18 -6 -15" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-6 -15 Q0 -20 6 -15" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M6 -15 Q12 -18 18 -10" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- 餐叉下方小字母 FBTI -->
  <text x="100" y="158" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">FBTI</text>
  
  <!-- 顶部装饰小圆点（味蕾/风味粒子） -->
  <circle cx="55" cy="55" r="4" fill="white" opacity="0.6"/>
  <circle cx="145" cy="55" r="4" fill="white" opacity="0.6"/>
  <circle cx="70" cy="35" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="130" cy="35" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="100" cy="30" r="3" fill="white" opacity="0.5"/>
</svg>