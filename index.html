<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="16道情景题，发现你的味觉人格。TasteType 口味人格测试。">
  <meta property="og:title" content="口味人格测试 · TasteType">
  <meta property="og:description" content="16道情景题，发现你的味觉人格。">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/FBTI_logo.svg" type="image/svg+xml">
  <title>FBT Intelligence Quiz</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* CSS Custom Properties (Design Tokens) */
    :root {
      /* Colors */
      --color-bg-base: #ECE9E0;
      --color-bg-raised: #F5F3EC;
      --color-bg-inverted: #141413;
      --color-accent: #D97757;
      --color-text-primary: #141413;
      --color-text-secondary: #6B6860;
      --color-border: #D8D5CC;

      /* Typography */
      --font-display: 'Lora', serif;
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Lora', serif;

      /* Spacing */
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-16: 64px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      /* Transitions */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-default: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Base Body Styles */
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    /* Screen Classes */
    .screen {
      display: none;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* Buttons */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-default), box-shadow var(--duration-fast) var(--ease-default);
    }
    .btn-primary:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 8px 24px rgba(217,119,87,0.25);
    }
    .btn-primary:active {
      transform: scale(0.99);
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-accent);
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid var(--color-accent);
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast);
    }
    .btn-secondary:hover {
      background: rgba(217,119,87,0.06);
      transform: translateY(-1px);
    }
    .btn-primary:focus-visible,
    .btn-secondary:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* Option Cards */
    .option-card {
      display: flex;
      align-items: flex-start;
      background: var(--color-bg-raised);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: border-color var(--duration-normal), transform var(--duration-fast), box-shadow var(--duration-fast);
      margin-bottom: 12px;
    }
    .option-card:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 16px rgba(20,20,19,0.08);
    }
    .option-card.selected {
      border-left-color: var(--color-accent);
      background: rgba(217,119,87,0.06);
    }
    .option-letter {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .option-text {
      font-family: var(--font-heading);
      font-weight: 500;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.5;
    }

    /* Progress Bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-10);
    }
    .progress-track {
      flex: 1;
      width: 100%;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--color-accent);
      border-radius: var(--radius-full);
      transition: width var(--duration-normal);
    }
    .progress-label {
      font-family: var(--font-heading);
      font-size: 14px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--duration-normal), transform var(--duration-normal);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp var(--duration-slow) var(--ease-default) forwards;
    }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 80ms; }
    .stagger-3 { animation-delay: 160ms; }
    .stagger-4 { animation-delay: 240ms; }
    .stagger-5 { animation-delay: 320ms; }
    .stagger-6 { animation-delay: 400ms; }

    /* Screen backgrounds */
    #screen-welcome,
    #screen-quiz {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(217,119,87,0.06) 0%, transparent 60%),
        var(--color-bg-base);
    }
    #screen-result {
      background: var(--color-bg-inverted);
      color: white;
    }

    /* === QUIZ SCREEN === */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-16) 0;
    }
    .quiz-header {
      margin-bottom: var(--space-10);
    }
    .quiz-question-text {
      font-family: var(--font-body);
      font-size: 20px;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-8);
    }
    .quiz-options { display: flex; flex-direction: column; }

    /* Question transition */
    #screen-quiz { overflow-x: hidden; }
    .quiz-panel {
      transition: transform var(--duration-normal) var(--ease-default),
                  opacity var(--duration-normal);
    }
    .quiz-panel.exit-left {
      transform: translateX(-40px);
      opacity: 0;
    }
    .quiz-panel.enter-right {
      transform: translateX(40px);
      opacity: 0;
    }
    .quiz-panel.enter-center {
      transform: translateX(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <section id="screen-welcome" class="screen active">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
      <div class="fade-in-up stagger-1">
        <img src="assets/FBTI_logo.svg" alt="FBTI Logo" width="80" height="80">
      </div>
      <h1 class="fade-in-up stagger-2" style="font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-4); line-height: 1.2;">口味人格测试</h1>
      <p class="fade-in-up stagger-3" style="font-family: var(--font-heading); font-size: 16px; color: var(--color-text-secondary); margin-bottom: var(--space-10); max-width: 360px; line-height: 1.6;">16道情景题 · 发现你的味觉人格</p>
      <button id="btn-start" class="btn-primary fade-in-up stagger-4" style="max-width: 320px;">开始测试</button>
    </div>
  </section>
  <section id="screen-quiz" class="screen">
    <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="quiz-wrap">
        <div class="quiz-header fade-in-up stagger-1">
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <span class="progress-label" id="progress-label">1 / 16</span>
          </div>
          <p class="quiz-question-text" id="question-text">题目加载中…</p>
        </div>
        <div class="quiz-options" id="quiz-options">
          <!-- Options populated by JS -->
        </div>
      </div>
    </div>
  </section>
  <section id="screen-result" class="screen">
  <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
    <!-- Avatar -->
    <div id="result-avatar" class="fade-in-up stagger-1" style="width:200px;height:200px;border-radius:50%;overflow:hidden;margin:0 auto var(--space-8);box-shadow:0 0 0 6px rgba(255,255,255,0.15);"></div>
    <!-- Type code -->
    <div id="result-type-code" class="fade-in-up stagger-2" style="font-family:var(--font-heading);font-size:56px;font-weight:700;color:white;letter-spacing:8px;margin-bottom:var(--space-4);line-height:1;"></div>
    <!-- Personality name -->
    <div id="result-name" class="fade-in-up stagger-3" style="font-family:var(--font-display);font-size:28px;font-weight:600;font-style:italic;color:white;margin-bottom:var(--space-6);"></div>
    <!-- Tagline -->
    <div id="result-tagline" class="fade-in-up stagger-4" style="font-family:var(--font-body);font-size:16px;color:rgba(255,255,255,0.8);max-width:480px;line-height:1.7;margin-bottom:var(--space-10);"></div>
    <!-- Share buttons -->
    <div class="fade-in-up stagger-5" style="display:flex;gap:var(--space-4);width:100%;max-width:360px;margin-bottom:var(--space-4);">
      <button id="btn-copy-link" class="btn-primary" style="flex:1;">复制链接</button>
      <button id="btn-share-image" class="btn-primary" style="flex:1;">保存图片</button>
    </div>
    <!-- Retake button -->
    <div class="fade-in-up stagger-6" style="width:100%;max-width:360px;">
      <button id="btn-retake" class="btn-secondary" style="color:white;border-color:rgba(255,255,255,0.4);">重新测试</button>
    </div>
  </div>
</section>

  <!-- Toast element -->
  <div id="toast" class="toast">链接已复制 ✓</div>

  <!-- qrcode.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <!-- Main script -->
  <script type="module">
    import { loadTypes, loadQuestions } from './modules/loader.js';
    import { calculateType } from './modules/scoring.js';
    import { renderQuestion, renderResult, loadTypeSVG } from './modules/render.js';

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const [typesData, questionsData] = await Promise.all([loadTypes(), loadQuestions()]);
      window.types = typesData.types;
      window.questions = questionsData.questions;

      // Attach btn-start AFTER data is loaded (fixes race condition)
      document.getElementById('btn-start').addEventListener('click', function() {
        showScreen('quiz');
        showQuestion(0);
      });

      // Attach result screen button handlers (depend on window.types/window.questions)
      document.getElementById('btn-copy-link').addEventListener('click', copyLink);
      document.getElementById('btn-share-image').addEventListener('click', generateShareImage);
      document.getElementById('btn-retake').addEventListener('click', retakeQuiz);

      var urlParams = new URLSearchParams(window.location.search);
      var urlType = urlParams.get('type');
      if (urlType && window.types[urlType]) {
        showScreen('result');
        renderResult(urlType, window.types[urlType]);
      } else {
        showScreen('welcome');
      }
    });

    let currentQuestion = 0;
    let answers = [];




    function showQuestion(index) {
      const q = window.questions[index];
      renderQuestion(q, index, window.questions.length);
      // Re-attach click handlers to newly rendered option cards
      const optionsEl = document.getElementById('quiz-options');
      const letters = ['A', 'B', 'C', 'D'];
      optionsEl.querySelectorAll('.option-card').forEach(function(card, i) {
        card.addEventListener('click', function() { selectOption(index, letters[i]); });
      });
    }

    function selectOption(questionIndex, letter) {
      answers[questionIndex] = letter;
      if (questionIndex < window.questions.length - 1) {
        // Transition to next question
        const panel = document.querySelector('#screen-quiz .quiz-wrap');
        panel.classList.add('exit-left');
        setTimeout(function() {
          showQuestion(questionIndex + 1);
          panel.classList.remove('exit-left');
          panel.classList.add('enter-center');
          setTimeout(function() { panel.classList.remove('enter-center'); }, 300);
        }, 200);
      } else {
        // Last question — show result
        showResult();
      }
    }

    function showResult() {
      var typeCode = calculateType(answers, window.questions, window.types).typeCode;
      showScreen('result');
      renderResult(typeCode, window.types[typeCode]);
    }

    function copyLink() {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(window.location.href).then(function() {
          showToast('链接已复制 ✓');
        }).catch(function() {
          fallbackCopy();
        });
      } else {
        fallbackCopy();
      }
    }
    function fallbackCopy() {
      var textArea = document.createElement('textarea');
      textArea.value = window.location.href;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        showToast('链接已复制 ✓');
      } catch(err) {
        showToast('复制失败，请长按复制');
      }
      document.body.removeChild(textArea);
    }

    function retakeQuiz() {
      currentQuestion = 0;
      answers = [];
      window.history.pushState({}, '', window.location.pathname);
      showScreen('welcome');
    }

    async function generateShareImage() {
      var typeCode;
      if (answers.length !== 16) {
        var urlParams = new URLSearchParams(window.location.search);
        typeCode = urlParams.get('type') || 'SCNU';
      } else {
        typeCode = calculateType(answers, window.questions, window.types).typeCode;
      }
      if (!window.types[typeCode]) typeCode = 'SCNU';

      var data = window.types[typeCode];
      var W = 900, H = 1200;
      var canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      var ctx = canvas.getContext('2d');

      // 1. Background
      ctx.fillStyle = '#ECE9E0';
      ctx.fillRect(0, 0, W, H);

      // 2. Radial gradient overlay
      var grad = ctx.createRadialGradient(W * 0.2, H * 0.1, 0, W * 0.2, H * 0.1, W * 0.8);
      grad.addColorStop(0, 'rgba(217,119,87,0.08)');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // 3. FBTI Logo (top center)
      var logoImg = new Image();
      logoImg.src = 'assets/FBTI_logo.svg';
      await Promise.race([
        new Promise(function(r) { logoImg.onload = r; }),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('logo timeout')); }, 5000); })
      ]).catch(function() {}); // If logo fails, continue without it
      var logoW = 100, logoH = 100;
      ctx.drawImage(logoImg, (W - logoW) / 2, 60, logoW, logoH);

      // 4. SVG Avatar (circular clip)
      var svgUrl = loadTypeSVG(typeCode);
      var avatarImg = new Image();
      var svgLoaded = false;
      fetch(svgUrl).then(function(r) { return r.text(); }).then(function(svgText) {
        avatarImg.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgText)));
        avatarImg.onload && avatarImg.onload();
        svgLoaded = true;
      }).catch(function() {
        // Silent failure acceptable — avatar area will be blank but image still generates
      });
      await Promise.race([
        new Promise(function(r) { avatarImg.onload = r; }),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('avatar timeout')); }, 5000); })
      ]).catch(function() {}); // If avatar fails, continue without it
      var avatarSize = 200;
      var avatarX = (W - avatarSize) / 2;
      var avatarY = 200;
      ctx.save();
      ctx.beginPath();
      ctx.arc(W / 2, avatarY + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(avatarImg, avatarX, avatarY, avatarSize, avatarSize);
      ctx.restore();
      // Ring
      ctx.strokeStyle = 'rgba(20,20,19,0.15)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(W / 2, avatarY + avatarSize / 2, avatarSize / 2 + 3, 0, Math.PI * 2);
      ctx.stroke();

      // 5. Type code
      var spacedCode = typeCode.split('').join(' ');
      ctx.font = '700 64px Poppins, Arial, sans-serif';
      ctx.fillStyle = '#141413';
      ctx.textAlign = 'center';
      ctx.fillText(spacedCode, W / 2, avatarY + avatarSize + 80);

      // 6. Personality name
      ctx.font = 'italic 600 28px Lora, "Noto Serif SC", serif';
      ctx.fillStyle = '#141413';
      ctx.textAlign = 'center';
      ctx.fillText(data.name, W / 2, avatarY + avatarSize + 130);

      // 7. Tagline (word-wrap)
      ctx.font = '400 16px Lora, "Noto Serif SC", serif';
      ctx.fillStyle = '#6B6860';
      ctx.textAlign = 'center';
      var tagline = data.tagline;
      var maxWidth = W - 80;
      var lineHeight = 26;
      var lines = wrapText(ctx, tagline, maxWidth);
      var tagY = avatarY + avatarSize + 170;
      lines.forEach(function(line, i) {
        ctx.fillText(line, W / 2, tagY + i * lineHeight);
      });

      // 8. Decorative line
      ctx.strokeStyle = '#D97757';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 40, tagY + lines.length * lineHeight + 20);
      ctx.lineTo(W / 2 + 40, tagY + lines.length * lineHeight + 20);
      ctx.stroke();

      // 9. QR Code
      var qrUrl = 'https://fbti.app/result?type=' + typeCode;
      var qrCanvas = document.createElement('canvas');
      qrCanvas.width = 160; qrCanvas.height = 160;
      if (typeof QRCode === 'undefined') {
        showToast('图片生成失败，请重试');
        return;
      }
      var qrOk = false;
      try {
        await Promise.race([
          new Promise(function(resolve, reject) {
            QRCode.toCanvas(qrCanvas, qrUrl, { width: 160, margin: 1 }, function(err) {
              if (!err) resolve(); else reject(err);
            });
          }),
          new Promise(function(_, reject) { setTimeout(function() { reject(new Error('qr timeout')); }, 5000); })
        ]);
        qrOk = true;
      } catch(e) {
        showToast('图片生成失败，请重试');
      }
      if (!qrOk) return;

      // Continue with drawing QR and download only if qrOk is true
      var qrX = (W - 160) / 2;
      var qrY = H - 160 - 60;
      ctx.drawImage(qrCanvas, qrX, qrY, 160, 160);
      // QR label
      ctx.font = '400 12px Poppins, Arial, sans-serif';
      ctx.fillStyle = '#6B6860';
      ctx.textAlign = 'center';
      ctx.fillText('fbti.app/result', W / 2, qrY + 170);

      // 10. Download
      var link = document.createElement('a');
      link.download = 'fbti-' + typeCode.toLowerCase() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('图片已保存 ✓');
    }

    function wrapText(ctx, text, maxWidth) {
      var words = text.split('');
      var lines = [];
      var current = '';
      for (var i = 0; i < words.length; i++) {
        var test = current + words[i];
        if (ctx.measureText(test).width > maxWidth && current.length > 0) {
          lines.push(current);
          current = words[i];
        } else {
          current = test;
        }
      }
      if (current.length > 0) lines.push(current);
      return lines;
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(function() { toast.classList.remove('visible'); }, 2000);
    }
  </script>
</body>
</html>
