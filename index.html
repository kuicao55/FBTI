<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="24道情景题，发现你的味觉人格。TasteType 口味人格测试。">
  <meta property="og:title" content="口味人格测试 · TasteType">
  <meta property="og:description" content="24道情景题，发现你的味觉人格。">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/FBTI_logo.png" type="image/png">
  <title>FBT Intelligence Quiz</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* CSS Custom Properties (Design Tokens) */
    :root {
      /* Colors */
      --color-bg-base: #ECE9E0;
      --color-bg-raised: #F5F3EC;
      --color-bg-inverted: #141413;
      --color-accent: #D97757;
      --color-text-primary: #141413;
      --color-text-secondary: #6B6860;
      --color-border: #D8D5CC;

      /* Typography */
      --font-display: 'Lora', serif;
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Lora', serif;

      /* Spacing */
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-16: 64px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      /* Transitions */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-default: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Base Body Styles */
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    /* Screen Classes */
    .screen {
      display: none;
      min-height: 100vh;
      position: relative;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* Buttons */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-default), box-shadow var(--duration-fast) var(--ease-default);
    }
    .btn-primary:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 8px 24px rgba(217,119,87,0.25);
    }
    .btn-primary:active {
      transform: scale(0.99);
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-accent);
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid var(--color-accent);
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast);
    }
    .btn-secondary:hover {
      background: rgba(217,119,87,0.06);
      transform: translateY(-1px);
    }
    .btn-primary:focus-visible,
    .btn-secondary:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* Option Cards */
    .option-card {
      display: flex;
      align-items: flex-start;
      background: var(--color-bg-raised);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: border-color var(--duration-normal), transform var(--duration-fast), box-shadow var(--duration-fast);
      margin-bottom: 12px;
    }
    .option-card:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 16px rgba(20,20,19,0.08);
    }
    .option-card.selected {
      border-left-color: var(--color-accent);
      background: rgba(217,119,87,0.06);
    }
    .option-letter {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .option-text {
      font-family: var(--font-heading);
      font-weight: 500;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.5;
    }

    /* Progress Bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      width: 100%;
    }
    .progress-track {
      flex: 1;
      min-width: 0;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--color-accent);
      border-radius: var(--radius-full);
      transition: width var(--duration-normal);
    }
    .progress-label {
      font-family: var(--font-heading);
      font-size: 14px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--duration-normal), transform var(--duration-normal);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp var(--duration-slow) var(--ease-default) forwards;
    }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 80ms; }
    .stagger-3 { animation-delay: 160ms; }
    .stagger-4 { animation-delay: 240ms; }
    .stagger-5 { animation-delay: 320ms; }
    .stagger-6 { animation-delay: 400ms; }

    /* Screen backgrounds */
    #screen-welcome,
    #screen-quiz {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(217,119,87,0.06) 0%, transparent 60%),
        var(--color-bg-base);
    }
    #screen-result {
      background: var(--color-bg-inverted);
      color: white;
    }

    /* === QUIZ SCREEN === */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-16) 0;
    }
    .quiz-topbar {
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      height: 56px;
      box-sizing: border-box;
    }
    .quiz-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .quiz-progress {
      flex: 1;
      min-width: 0;
      margin-left: var(--space-4);
    }
    .quiz-question-text {
      font-family: var(--font-body);
      font-size: 20px;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-8);
    }
    .quiz-options { display: flex; flex-direction: column; }

    /* Question transition */
    #screen-quiz { overflow-x: hidden; }
    .quiz-panel {
      transition: transform var(--duration-normal) var(--ease-default),
                  opacity var(--duration-normal);
    }
    .quiz-panel.exit-left {
      transform: translateX(-40px);
      opacity: 0;
    }
    .quiz-panel.enter-right {
      transform: translateX(40px);
      opacity: 0;
    }
    .quiz-panel.enter-center {
      transform: translateX(0);
      opacity: 1;
    }

    /* === RESULT SCREEN NEW ELEMENTS === */
    .taste-tag {
      background: rgba(217,119,87,0.25);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-family: var(--font-heading);
      font-size: 13px;
      border: 1px solid rgba(217,119,87,0.4);
    }

    .taste-tag-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--font-heading);
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .details-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .details-panel .radar-section {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .details-panel .bars-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .dimension-bar {
      margin-bottom: 8px;
    }
    .dimension-title {
      font-family: var(--font-heading);
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .bar-track {
      display: flex;
      height: 24px;
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }
    .bar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }

    /* === MOBILE RESPONSIVE === */
    @media (max-width: 640px) {
      /* Radar chart: override hardcoded SVG dimensions */
      .details-panel .radar-section svg {
        width: 100% !important;
        height: auto !important;
        max-width: 380px;
      }

      /* Quiz screen: reduce padding to fit viewport */
      .quiz-topbar {
        padding: 0 var(--space-6) !important;
        height: 48px !important;
      }
      .quiz-wrap {
        padding: var(--space-4) 0 !important;
        justify-content: flex-start !important;
      }
      .quiz-question-text {
        font-size: 16px !important;
        margin-bottom: var(--space-4) !important;
      }
      .option-card {
        padding: var(--space-4) !important;
        margin-bottom: 8px !important;
      }
      .option-letter {
        font-size: 14px !important;
      }
      .option-text {
        font-size: 14px !important;
      }

      /* Result screen: compact layout to fit without scrolling when details hidden */
      #screen-result .container {
        padding-top: var(--space-6) !important;
        padding-bottom: var(--space-6) !important;
      }
      #result-avatar {
        width: 100px !important;
        height: 100px !important;
        margin-bottom: var(--space-4) !important;
      }
      #result-type-code {
        font-size: 40px !important;
        letter-spacing: 4px !important;
      }
      #result-type-code-sub {
        font-size: 16px !important;
        margin-bottom: var(--space-4) !important;
      }
      #result-name {
        font-size: 20px !important;
        margin-bottom: var(--space-4) !important;
      }

      /* Screens: scrollable on mobile when content overflows */
      .screen {
        overflow-y: auto !important;
        max-height: 100vh;
      }
      .screen.active {
        overflow-y: auto;
      }
    }

/* === RESTAURANT SECTION === */
.restaurant-section {
  width: 100%;
  max-width: 540px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px 24px;
  margin: 0 auto 20px;
  text-align: left;
}
.restaurant-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.restaurant-section-title {
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  gap: 8px;
}
.restaurant-count {
  font-family: var(--font-heading);
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}
.restaurant-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}
.restaurant-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px 14px;
}
.restaurant-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
  flex-shrink: 0;
}
.restaurant-name {
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: 500;
  color: white;
  flex: 1;
}
.restaurant-meta {
  font-family: var(--font-heading);
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}
.btn-add-restaurant {
  width: 100%;
  background: rgba(217,119,87,0.15);
  color: var(--color-accent);
  border: 1px dashed rgba(217,119,87,0.4);
  border-radius: 10px;
  padding: 10px;
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background var(--duration-fast), border-color var(--duration-fast);
}
.btn-add-restaurant:hover {
  background: rgba(217,119,87,0.25);
  border-color: rgba(217,119,87,0.6);
}
.at-limit-msg {
  font-family: var(--font-heading);
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  padding: 8px;
}

/* === RESTAURANT MODAL === */
.restaurant-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
}
.restaurant-modal-overlay.hidden {
  display: none;
}
.restaurant-modal {
  background: var(--color-bg-inverted);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 380px;
}
.restaurant-modal-title {
  font-family: var(--font-heading);
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
  text-align: center;
  color: white;
}
.restaurant-modal-subtitle {
  font-family: var(--font-heading);
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 20px;
}
.restaurant-form-group {
  margin-bottom: 14px;
}
.restaurant-form-label {
  font-family: var(--font-heading);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  display: block;
  margin-bottom: 6px;
}
.restaurant-form-input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 10px 14px;
  color: white;
  font-family: var(--font-heading);
  font-size: 14px;
  outline: none;
  transition: border-color var(--duration-fast);
}
.restaurant-form-input:focus {
  border-color: var(--color-accent);
}
.restaurant-form-input::placeholder {
  color: rgba(255,255,255,0.3);
}
.restaurant-form-hint {
  font-family: var(--font-heading);
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}
.btn-restaurant-submit {
  width: 100%;
  background: var(--color-accent);
  color: white;
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity var(--duration-fast);
}
.btn-restaurant-submit:hover {
  opacity: 0.85;
}
.btn-restaurant-cancel {
  width: 100%;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-heading);
  font-size: 13px;
  border: none;
  padding: 8px;
  cursor: pointer;
  margin-top: 4px;
}
  </style>
</head>
<body>
  <section id="screen-welcome" class="screen active">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
      <div class="fade-in-up stagger-1">
        <img src="assets/FBTI_logo.png" alt="FBTI Logo" width="80" height="80">
      </div>
      <h1 class="fade-in-up stagger-2" style="font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-4); line-height: 1.2;">口味人格测试</h1>
      <p class="fade-in-up stagger-3" style="font-family: var(--font-heading); font-size: 16px; color: var(--color-text-secondary); margin-bottom: var(--space-10); max-width: 360px; line-height: 1.6;">24道情景题 · 发现你的味觉人格</p>
      <button id="btn-start" class="btn-primary fade-in-up stagger-4" style="max-width: 320px;">开始测试</button>
    </div>
  </section>
  <section id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <img src="assets/FBTI_logo.png" alt="FBTI" class="quiz-logo" id="btn-logo-back" style="cursor:pointer;">
      <div class="quiz-progress">
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <span class="progress-label" id="progress-label">1 / 24</span>
        </div>
      </div>
    </div>
    <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="quiz-wrap">
        <p class="quiz-question-text" id="question-text">题目加载中…</p>
        <div class="quiz-options" id="quiz-options">
          <!-- Options populated by JS -->
        </div>
      </div>
    </div>
  </section>
  <section id="screen-result" class="screen">
  <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
    <!-- Avatar -->
    <div id="result-avatar" class="fade-in-up stagger-1" style="width:200px;height:200px;border-radius:50%;overflow:hidden;margin:0 auto var(--space-8);"></div>
    <!-- Type code (main) -->
    <div id="result-type-code" class="fade-in-up stagger-2" style="font-family:var(--font-heading);font-size:56px;font-weight:700;color:white;letter-spacing:8px;margin-bottom:4px;line-height:1;"></div>
    <!-- Type code (sub) -->
    <div id="result-type-code-sub" class="fade-in-up stagger-2" style="font-size:24px;opacity:0.4;letter-spacing:2px;margin-bottom:var(--space-6);line-height:1;font-family:var(--font-heading);"></div>
    <!-- Personality name -->
    <div id="result-name" class="fade-in-up stagger-3" style="font-family:var(--font-display);font-size:28px;font-weight:600;font-style:italic;color:white;margin-bottom:16px;"></div>
    <!-- Taste signature tags -->
    <div id="result-taste-signature" class="fade-in-up stagger-3" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;"></div>
    <!-- Secondary taste signature tags (lowercase) -->
    <div id="result-taste-signature-secondary" class="fade-in-up stagger-3" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;"></div>
    <!-- Self description (with orange left border) -->
    <div id="result-self-description" class="fade-in-up stagger-4" style="border-left:3px solid #D97757;padding-left:16px;max-width:480px;text-align:left;font-style:italic;line-height:1.7;margin-bottom:24px;color:rgba(255,255,255,0.85);"></div>
    <!-- Analysis -->
    <div id="result-analysis" class="fade-in-up stagger-4" style="max-width:480px;text-align:left;line-height:1.7;margin-bottom:24px;color:rgba(255,255,255,0.75);"></div>
    <!-- Restaurant recommendation section -->
    <div id="restaurant-section-container"></div>
    <!-- Details toggle button -->
    <button id="btn-details" class="fade-in-up stagger-5" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:10px 20px;border-radius:20px;cursor:pointer;margin-bottom:16px;font-family:var(--font-heading);font-size:14px;" aria-expanded="false" aria-controls="details-panel">查看详细分析 ▼</button>
    <!-- Collapsed details panel -->
    <div id="details-panel" class="fade-in-up" style="display:none;width:100%;max-width:640px;margin:0 auto 32px;text-align:left;" role="region" aria-label="详细分析"></div>
    <!-- Share buttons -->
    <div class="fade-in-up stagger-5" style="display:flex;gap:var(--space-4);width:100%;max-width:360px;margin-bottom:var(--space-4);">
      <button id="btn-copy-link" class="btn-primary" style="flex:1;">分享链接</button>
      <button id="btn-share-image" class="btn-primary" style="flex:1;">保存图片</button>
    </div>
    <!-- Retake button -->
    <div class="fade-in-up stagger-6" style="width:100%;max-width:360px;">
      <button id="btn-retake" class="btn-secondary" style="color:white;border-color:rgba(255,255,255,0.4);">重新测试</button>
    </div>
  </div>
</section>

  <!-- Toast element -->
  <div id="toast" class="toast">链接已复制 ✓</div>

  <!-- Restaurant submit modal -->
  <div id="restaurant-modal-overlay" class="restaurant-modal-overlay hidden" onclick="closeRestaurantModalOnOverlay(event)">
    <div class="restaurant-modal" onclick="event.stopPropagation()">
      <div class="restaurant-modal-title">推荐餐厅</div>
      <div class="restaurant-modal-subtitle" id="restaurant-modal-subtitle">为 HUAE 型人格推荐 · 口味相近的人会看到</div>

      <div class="restaurant-form-group">
        <label class="restaurant-form-label">地名·餐厅名称 *</label>
        <input class="restaurant-form-input" type="text" placeholder="例如：上海·鼎泰丰" maxlength="30" id="restaurant-name-input">
      </div>

      <div class="restaurant-form-group">
        <label class="restaurant-form-label">你的昵称（选填）</label>
        <input class="restaurant-form-input" type="text" placeholder="例如：小王" maxlength="20" id="restaurant-nick-input">
        <div class="restaurant-form-hint">不填则显示"匿名用户"</div>
      </div>

      <button class="btn-restaurant-submit" id="btn-restaurant-submit">提交推荐</button>
      <button class="btn-restaurant-cancel" onclick="closeRestaurantModal()">取消</button>
    </div>
  </div>

  <!-- qrcodejs CDN (local QR generation, no tainted canvas issue) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Main script -->
  <script type="module">
    import { loadTypes, loadQuestions, loadRestaurants, loadRestaurantSettings } from './modules/loader.js';
    import { selectQuestions, calculateType, encodeDimensionResults, decodeDimensionResults } from './modules/scoring.js';
    import { renderQuestion, renderResult, renderRestaurantSection, loadTypeSVG, buildSubCode, drawRadarToCanvas, CODE_COLORS, getCodeLabel } from './modules/render.js';

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', async function() {
      try {
        const [typesData, questionsData] = await Promise.all([loadTypes(), loadQuestions()]);
        window.types = typesData.types;
        window.questions = questionsData.questions;
        // Stratified selection of 24 questions for this session
        window.selectedQuestions = selectQuestions(questionsData);

        // Attach btn-start AFTER data is loaded (fixes race condition)
        document.getElementById('btn-start').addEventListener('click', function() {
          showScreen('quiz');
          showQuestion(0);
        });

        // Logo click: return to home
        var logoBtn = document.getElementById('btn-logo-back');
        if (logoBtn) {
          logoBtn.addEventListener('click', function() {
            showScreen('welcome');
          });
        }

        // Attach result screen button handlers (depend on window.types/window.selectedQuestions)
        document.getElementById('btn-copy-link').addEventListener('click', copyLink);
        document.getElementById('btn-share-image').addEventListener('click', generateShareImage);
        document.getElementById('btn-retake').addEventListener('click', retakeQuiz);

        var urlParams = new URLSearchParams(window.location.search);
        var urlType = urlParams.get('type');
        var urlData = urlParams.get('data');
        var dimensionResults = null;
        if (urlData) {
          // Try compact format first
          try { dimensionResults = decodeDimensionResults(urlData); } catch(e) { console.error('Compact decode error:', e); }
          // Fall back to old base64+JSON format
          if (!dimensionResults) {
            try { dimensionResults = JSON.parse(decodeURIComponent(atob(urlData))); } catch(e) { console.error('Old format decode error:', e); }
          }
          console.log('[FBTI] URL data decode: input len=' + urlData.length + ', decoded=' + !!dimensionResults, dimensionResults);
        }
        if (urlType && window.types[urlType]) {
          showScreen('result');
          renderResult(urlType, window.types[urlType], dimensionResults);
          // Wire up details panel toggle for URL-loaded results
          bindDetailsToggle();
          // Load and render restaurant section
          (async function() {
            try {
              var settings = await loadRestaurantSettings();
              window.restaurantSettings = settings;
              window.restaurantMaxPerType = settings.maxPerType || 5;
              var restaurantsData = await loadRestaurants();
              // Merge with localStorage overrides
              try {
                var local = JSON.parse(localStorage.getItem('fbti_restaurants') || 'null');
                if (local) {
                  Object.keys(local).forEach(function(k) {
                    if (Array.isArray(local[k]) && local[k].length > 0) {
                      restaurantsData[k] = local[k];
                    }
                  });
                }
              } catch(e) {}
              var container = document.getElementById('restaurant-section-container');
              if (container && restaurantsData[urlType] && restaurantsData[urlType].length > 0) {
                renderRestaurantSection(container, urlType, restaurantsData[urlType]);
              }
            } catch(e) {
              console.warn('[FBTI] Restaurant section error:', e);
            }
          })();
        } else {
          showScreen('welcome');
        }
      } catch (err) {
        console.error('Failed to initialize quiz:', err);
        showToast('加载失败，请刷新重试');
        // btn-start not wired up — user stays on welcome screen
      }
    });

    let currentQuestion = 0;
    let answers = [];




    function showQuestion(index) {
      const q = window.selectedQuestions[index];
      renderQuestion(q, index, window.selectedQuestions.length);
      // Re-attach click handlers to newly rendered option cards
      const optionsEl = document.getElementById('quiz-options');
      const letters = ['A', 'B', 'C', 'D'];
      optionsEl.querySelectorAll('.option-card').forEach(function(card, i) {
        card.addEventListener('click', function() { selectOption(index, letters[i]); });
      });
    }

    function selectOption(questionIndex, letter) {
      answers[questionIndex] = letter;
      if (questionIndex < window.selectedQuestions.length - 1) {
        // Transition to next question
        const panel = document.querySelector('#screen-quiz .quiz-wrap');
        panel.classList.add('exit-left');
        setTimeout(function() {
          showQuestion(questionIndex + 1);
          panel.classList.remove('exit-left');
          panel.classList.add('enter-center');
          setTimeout(function() { panel.classList.remove('enter-center'); }, 300);
        }, 200);
      } else {
        // Last question — show result
        showResult();
      }
    }

    function showResult() {
      var result = calculateType(answers, window.selectedQuestions, window.types);
      showScreen('result');
      renderResult(result.typeCode, window.types[result.typeCode], result.dimensionResults);
      bindDetailsToggle();
      // Load and render restaurant section
      (async function() {
        try {
          var settings = await loadRestaurantSettings();
          window.restaurantSettings = settings;
          window.restaurantMaxPerType = settings.maxPerType || 5;
          var restaurantsData = await loadRestaurants();
          // Merge with localStorage overrides
          try {
            var local = JSON.parse(localStorage.getItem('fbti_restaurants') || 'null');
            if (local) {
              Object.keys(local).forEach(function(k) {
                if (Array.isArray(local[k]) && local[k].length > 0) {
                  restaurantsData[k] = local[k];
                }
              });
            }
          } catch(e) {}
          var container = document.getElementById('restaurant-section-container');
          if (container && restaurantsData[result.typeCode] && restaurantsData[result.typeCode].length > 0) {
            renderRestaurantSection(container, result.typeCode, restaurantsData[result.typeCode]);
          }
        } catch(e) {
          console.warn('[FBTI] Restaurant section error:', e);
        }
      })();
    }

    function bindDetailsToggle() {
      var detailsBtn = document.getElementById('btn-details');
      var detailsPanel = document.getElementById('details-panel');
      if (detailsBtn && detailsPanel) {
        detailsBtn.addEventListener('click', function() {
          var isVisible = detailsPanel.style.display !== 'none';
          detailsPanel.style.display = isVisible ? 'none' : 'block';
          detailsBtn.textContent = isVisible ? '查看详细分析 ▼' : '收起详细分析 ▲';
          detailsBtn.setAttribute('aria-expanded', isVisible ? 'false' : 'true');
        });
      }
    }

    function copyLink() {
      var typeCode, dimensionResults;
      if (answers.length === (window.selectedQuestions ? window.selectedQuestions.length : 24)) {
        var result = calculateType(answers, window.selectedQuestions, window.types);
        typeCode = result.typeCode;
        dimensionResults = result.dimensionResults;
      } else {
        var urlParams2 = new URLSearchParams(window.location.search);
        typeCode = urlParams2.get('type') || 'SCNU';
        var dataParam = urlParams2.get('data');
        if (dataParam) {
          // Try compact format first (same as page load logic)
          try { dimensionResults = decodeDimensionResults(dataParam); } catch(e) {}
          // Fall back to old base64+JSON format
          if (!dimensionResults) {
            try { dimensionResults = JSON.parse(decodeURIComponent(atob(dataParam))); } catch(e) {}
          }
        }
      }
      var url = new URL(window.location.href);
      url.searchParams.set('type', typeCode);
      if (dimensionResults) {
        url.searchParams.set('data', encodeDimensionResults(dimensionResults));
      } else {
        url.searchParams.delete('data');
      }
      var shareUrl = url.toString();
      if (navigator.share) {
        navigator.share({
          title: '我的味型测试结果',
          text: '快来看看我的味型分析！',
          url: shareUrl
        }).catch(function() {
          fallbackCopy(shareUrl);
        });
      } else {
        fallbackCopy(shareUrl);
      }
    }
    function fallbackCopy(shareUrl) {
      var textArea = document.createElement('textarea');
      textArea.value = shareUrl || window.location.href;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        showToast('链接已复制 ✓');
      } catch(err) {
        showToast('复制失败，请长按复制');
      }
      document.body.removeChild(textArea);
    }

    function retakeQuiz() {
      currentQuestion = 0;
      answers = [];
      window.history.pushState({}, '', window.location.pathname);
      showScreen('welcome');
    }

    function rrect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    async function generateShareImage() {
      // 1. Gather data
      var typeCode, dimensionResults;
      if (answers.length === (window.selectedQuestions ? window.selectedQuestions.length : 24)) {
        var result = calculateType(answers, window.selectedQuestions, window.types);
        typeCode = result.typeCode;
        dimensionResults = result.dimensionResults;
      } else {
        var urlParams = new URLSearchParams(window.location.search);
        typeCode = urlParams.get('type') || 'SCNU';
        var dataParam = urlParams.get('data');
        if (dataParam) {
          // Try compact format first
          try { dimensionResults = decodeDimensionResults(dataParam); } catch(e) {}
          // Fall back to old base64+JSON format
          if (!dimensionResults) {
            try { dimensionResults = JSON.parse(decodeURIComponent(atob(dataParam))); } catch(e) {}
          }
        }
      }
      if (!window.types[typeCode]) typeCode = 'SCNU';

      var typeData = window.types[typeCode];
      var subCode = dimensionResults ? buildSubCode(dimensionResults) : '';
      var primaryTags = typeData.tasteSignature || [];
      var secondaryTags = [];
      if (dimensionResults) {
        ['stimulus', 'taste', 'philosophy', 'novelty'].forEach(function(dim) {
          var dr = dimensionResults[dim];
          if (dr && dr.secondary) {
            secondaryTags.push(dr.secondary.toLowerCase() + ' \u00B7 ' + getCodeLabel(dr.secondary, dim));
          }
        });
      }

      showToast('\u6B63\u5728\u751F\u6210\u56FE\u7247\u2026');

      // 2. Canvas setup — 900×1200 (3:4 portrait), 2x resolution
      var W = 900, H = 1200;
      var DPR = 2;
      var canvas = document.createElement('canvas');
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);

      // 3. Background
      ctx.fillStyle = '#ECE9E0';
      ctx.fillRect(0, 0, W, H);


      // 4. Avatar (200px, result page match) — tries svg, png, jpg
      var avatarReady = false;
      var avatarImg = new Image();
      var avatarExts = ['svg', 'png', 'jpg'];
      var avatarLoaded = false;
      (async function tryAvatarLoad() {
        for (var i = 0; i < avatarExts.length; i++) {
          var ext = avatarExts[i];
          var path = './assets/' + typeCode + '.' + ext;
          console.log('[FBTI] Avatar attempt: ' + path);
          try {
            if (ext === 'svg') {
              var r = await fetch(path);
              if (!r.ok) { console.log('[FBTI] ' + ext + ' not found, continue'); continue; }
              var svgText = await r.text();
              avatarImg.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgText)));
            } else {
              // PNG/JPG: direct src, no fetch
              avatarImg.src = path;
              console.log('[FBTI] ' + ext + ' src set, complete=' + avatarImg.complete + ', width=' + avatarImg.width);
            }
            await new Promise(function(res, rej) {
              var t = setTimeout(function() { console.log('[FBTI] ' + ext + ' timeout'); rej(new Error('timeout')); }, 2000);
              avatarImg.onload = function() { clearTimeout(t); console.log('[FBTI] ' + ext + ' loaded! ready=' + avatarImg.readyState); avatarReady = true; avatarLoaded = true; res(); };
              avatarImg.onerror = function() { clearTimeout(t); console.log('[FBTI] ' + ext + ' error, try next'); rej(new Error('load error')); };
            });
            console.log('[FBTI] Avatar success with ' + ext);
            break;
          } catch(e) { console.log('[FBTI] Avatar ' + ext + ' failed: ' + e.message); }
        }
      })();
      await Promise.race([
        new Promise(function(r) {
          var check = function() {
            if (avatarLoaded || avatarReady) { r(); return; }
            setTimeout(check, 50);
          };
          check();
        }),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('avatar timeout')); }, 5000); })
      ]).catch(function() {});
      var avatarSize = 280;
      var avatarY = 30;
      ctx.save();
      ctx.beginPath();
      ctx.arc(W / 2, avatarY + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
      ctx.clip();
      if (avatarReady) {
        ctx.drawImage(avatarImg, (W - avatarSize) / 2, avatarY, avatarSize, avatarSize);
      } else {
        ctx.fillStyle = '#D97757';
        ctx.fill();
      }
      ctx.restore();

      // 5. Type code
      var curY = avatarY + avatarSize + 56;
      ctx.font = '700 80px Poppins, Arial, sans-serif';
      ctx.fillStyle = '#141413';
      ctx.textAlign = 'center';
      ctx.fillText(typeCode.split('').join('  '), W / 2, curY);

      // 6. Sub-code
      if (subCode) {
        curY += 44;
        ctx.font = '400 24px Poppins, Arial, sans-serif';
        ctx.fillStyle = 'rgba(20,20,19,0.4)';
        ctx.fillText(subCode, W / 2, curY);
      }

      // 7. Name
      curY += 56;
      ctx.font = 'italic 600 48px Lora, "Noto Serif SC", serif';
      ctx.fillStyle = '#141413';
      ctx.fillText(typeData.name, W / 2, curY);

      // 8. Primary tags (orange pills)
      curY += 66;
      var tagRadius = 22;
      var tagPadX = 16, tagGapH = 14, tagGapV = 12;
      var rowW = W - 80;
      ctx.font = '500 18px Poppins, Arial, sans-serif';
      var lineH = tagRadius * 2 + tagGapV;
      var currentLineW = 0;
      var tagsByLine = [[]];
      primaryTags.forEach(function(tag) {
        var tw = ctx.measureText(tag).width + tagPadX * 2;
        if (currentLineW + tw > rowW && tagsByLine[tagsByLine.length - 1].length > 0) {
          tagsByLine.push([]);
          currentLineW = 0;
        }
        tagsByLine[tagsByLine.length - 1].push({ tag: tag, tw: tw });
        currentLineW += tw + tagGapH;
      });
      tagsByLine.filter(function(l) { return l.length > 0; }).forEach(function(line) {
        var lineTotalW = line.reduce(function(s, t) { return s + t.tw; }, 0) + (line.length - 1) * tagGapH;
        var tx = (W - lineTotalW) / 2;
        line.forEach(function(item) {
          rrect(ctx, tx, curY, item.tw, tagRadius * 2, tagRadius);
          ctx.fillStyle = 'rgba(217,119,87,0.25)';
          ctx.fill();
          ctx.fillStyle = '#141413';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(item.tag, tx + item.tw / 2, curY + tagRadius);
          tx += item.tw + tagGapH;
        });
        curY += lineH;
      });
      ctx.textBaseline = 'alphabetic';

      // 9. Secondary tags (small muted pills)
      if (secondaryTags.length > 0) {
        curY += 16;
        var secRadius = 20;
        var secPadX = 8, secGapH = 6, secGapV = 4;
        ctx.font = '400 16px Poppins, Arial, sans-serif';
        var secLineH = secRadius * 2 + secGapV;
        var secByLine = [[]];
        var secLineW = 0;
        secondaryTags.forEach(function(tag) {
          var tw = ctx.measureText(tag).width + secPadX * 2;
          if (secLineW + tw > W - 80 && secByLine[secByLine.length - 1].length > 0) {
            secByLine.push([]);
            secLineW = 0;
          }
          secByLine[secByLine.length - 1].push({ tag: tag, tw: tw });
          secLineW += tw + secGapH;
        });
        secByLine.filter(function(l) { return l.length > 0; }).forEach(function(line) {
          var lineTotalW = line.reduce(function(s, t) { return s + t.tw; }, 0) + (line.length - 1) * secGapH;
          var tx = (W - lineTotalW) / 2;
          line.forEach(function(item) {
            rrect(ctx, tx, curY, item.tw, secRadius * 2, secRadius);
            ctx.fillStyle = 'rgba(20,20,19,0.08)';
            ctx.fill();
            ctx.fillStyle = 'rgba(20,20,19,0.45)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.tag, tx + item.tw / 2, curY + secRadius);
            tx += item.tw + secGapH;
          });
          curY += secLineH;
        });
        ctx.textBaseline = 'alphabetic';
      }

      // 10. Self-description (italic, orange left border)
      curY += 16;
      if (typeData.selfDescription) {
        var sqX = 40, sqW = W - 80;
        ctx.font = 'italic 400 22px Lora, "Noto Serif SC", serif';
        ctx.fillStyle = 'rgba(20,20,19,0.75)';
        ctx.textAlign = 'left';
        var sqLines = wrapText(ctx, '\u201C' + typeData.selfDescription + '\u201D', sqW - 20);
        sqLines.forEach(function(line, i) {
          ctx.fillText(line, sqX + 16, curY + 28 + i * 32);
        });
        ctx.strokeStyle = '#D97757';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sqX + 3, curY);
        ctx.lineTo(sqX + 3, curY + sqLines.length * 32 + 14);
        ctx.stroke();
        curY += sqLines.length * 32 + 40;
      }

      // 11. Analysis (italic, no border)
      if (typeData.analysis) {
        ctx.font = 'italic 400 20px Lora, "Noto Serif SC", serif';
        ctx.fillStyle = 'rgba(20,20,19,0.65)';
        ctx.textAlign = 'left';
        var anaLines = wrapText(ctx, typeData.analysis, W - 80);
        anaLines.slice(0, 5).forEach(function(line, i) {
          ctx.fillText(line, 40, curY + 26 + i * 30);
        });
        curY += anaLines.slice(0, 5).length * 30 + 34;
      }

      // 12. Stacked bars (4 dimensions, 2 columns)
      curY += 16;
      var barX = 40;
      var halfW = (W - barX * 2 - 24) / 2;
      var barH = 26;
      var dimLabels = ['刺激', '味觉', '风味', '新奇'];
      var dimKeys = ['stimulus', 'taste', 'philosophy', 'novelty'];
      var barRadius = 5;
      var rowBottom = curY;

      dimKeys.forEach(function(dimKey, idx) {
        var dr = dimensionResults ? dimensionResults[dimKey] : null;
        var col = idx % 2;
        var row = Math.floor(idx / 2);
        var rowY = rowBottom + row * 62;
        var x = barX + col * (halfW + 24);

        ctx.font = '600 11px Poppins, Arial, sans-serif';
        ctx.fillStyle = 'rgba(20,20,19,0.5)';
        ctx.textAlign = 'left';
        ctx.fillText(dimLabels[idx], x, rowY + 10);

        var barRowY = rowY + 14;
        ctx.save();
        ctx.fillStyle = 'rgba(20,20,19,0.08)';
        rrect(ctx, x, barRowY, halfW, barH, barRadius);
        ctx.fill();
        rrect(ctx, x, barRowY, halfW, barH, barRadius);
        ctx.clip();
        if (dr && dr.percentages) {
          var sorted = Object.entries(dr.percentages).sort(function(a, b) { return b[1] - a[1]; });
          var bx = x;
          sorted.forEach(function(entry) {
            var pct = Math.round(entry[1]);
            if (pct <= 0) return;
            var color = CODE_COLORS[entry[0]] || '#ccc';
            var w = halfW * pct / 100;
            ctx.fillStyle = color;
            ctx.fillRect(bx, barRowY, w, barH);
            bx += w;
          });
        }
        ctx.restore();

        ctx.font = '400 10px Poppins, Arial, sans-serif';
        var legY = barRowY + barH + 4;
        var legX = x;
        if (dr && dr.percentages) {
          var sorted = Object.entries(dr.percentages).sort(function(a, b) { return b[1] - a[1]; });
          sorted.forEach(function(entry) {
            var pct = Math.round(entry[1]);
            if (pct <= 0) return;
            var color = CODE_COLORS[entry[0]] || '#ccc';
            var label = entry[0] + getCodeLabel(entry[0], dimKey) + pct + '%';
            var lw = ctx.measureText(label).width + 12;
            if (legX + lw > x + halfW) {
              legX = x;
              legY += 12;
            }
            ctx.beginPath();
            ctx.arc(legX + 4, legY + 4, 3, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.fillStyle = 'rgba(20,20,19,0.6)';
            ctx.textAlign = 'left';
            ctx.fillText(label, legX + 10, legY + 7);
            legX += lw;
          });
        }
      });
      curY = rowBottom + 2 * 62 + 10;


      // 13. QR Code (read from assets/QR.png — placeholder until real file is added)
      var qrSize = 110;
      var qrX = (W - qrSize) / 2;
      var qrY = H - 150;
      var qrReady = false;
      var qrImg = new Image();
      qrImg.onload = function() { qrReady = true; };
      qrImg.src = 'assets/QR.png?v=' + Date.now();
      await Promise.race([
        new Promise(function(r) { qrImg.onload = function() { qrReady = true; r(); }; }),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('qr timeout')); }, 5000); })
      ]).catch(function() {});
      if (qrReady) {
        ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
      } else {
        // Fallback placeholder: rounded rect with text
        ctx.fillStyle = 'rgba(20,20,19,0.08)';
        rrect(ctx, qrX, qrY, qrSize, qrSize, 8);
        ctx.fill();
        ctx.font = '400 16px Poppins, Arial, sans-serif';
        ctx.fillStyle = 'rgba(20,20,19,0.3)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('QR', W / 2, qrY + qrSize / 2);
        ctx.textBaseline = 'alphabetic';
      }
      ctx.font = '400 16px Poppins, Arial, sans-serif';
      ctx.fillStyle = 'rgba(20,20,19,0.4)';
      ctx.textAlign = 'center';
      ctx.fillText('\u626B\u7801\u6D4B\u8BD5fbti', W / 2, qrY + qrSize + 18);

      // 14. Download / Share
      var filename = 'fbti-' + typeCode.toLowerCase() + '.png';
      var shareTitle = '\u6211\u7684\u5473\u578B\u6D4B\u8BD5\u7ED3\u679C';
      var shareText = '\u9EBB\u70E6\u770B\u770B\u6211\u7684\u5473\u578B\u5206\u6790\uFF01 ' + window.location.href;

      canvas.toBlob(function(blob) {
        if (blob) {
          var file = new File([blob], filename, { type: 'image/png' });
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            // Mobile: opens share sheet (WeChat, Save Image, etc.)
            navigator.share({
              title: shareTitle,
              text: shareText,
              files: [file]
            }).then(function() {
              showToast('\u56FE\u7247\u5DF2\u5206\u4EAB \u2713');
            }).catch(function(e) {
              if (e.name !== 'AbortError') {
                fallbackDownload(blob, filename);
              }
            });
          } else {
            // Desktop or mobile without file sharing support: direct download
            fallbackDownload(blob, filename);
          }
        }
      }, 'image/png');

      function fallbackDownload(blob, name) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = name;
        link.href = url;
        link.click();
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        showToast('\u56FE\u7247\u5DF2\u4FDD\u5B58 \u2713');
      }
    }

    function wrapText(ctx, text, maxWidth) {
      var words = text.split('');
      var lines = [];
      var current = '';
      for (var i = 0; i < words.length; i++) {
        var test = current + words[i];
        if (ctx.measureText(test).width > maxWidth && current.length > 0) {
          lines.push(current);
          current = words[i];
        } else {
          current = test;
        }
      }
      if (current.length > 0) lines.push(current);
      return lines;
    }

    // ===== Restaurant Modal =====
    window.currentRestaurantType = null;

    window.openRestaurantModal = function(typeCode) {
      window.currentRestaurantType = typeCode;
      var overlay = document.getElementById('restaurant-modal-overlay');
      var subtitle = document.getElementById('restaurant-modal-subtitle');
      subtitle.textContent = '为 ' + typeCode + ' 型人格推荐 · 口味相近的人会看到';
      document.getElementById('restaurant-name-input').value = '';
      document.getElementById('restaurant-nick-input').value = '';
      overlay.classList.remove('hidden');
      document.getElementById('restaurant-name-input').focus();
    };

    window.closeRestaurantModal = function() {
      document.getElementById('restaurant-modal-overlay').classList.add('hidden');
    };

    function closeRestaurantModalOnOverlay(e) {
      if (e.target.id === 'restaurant-modal-overlay') closeRestaurantModal();
    }

    document.getElementById('btn-restaurant-submit').addEventListener('click', function() {
      var name = document.getElementById('restaurant-name-input').value.trim();
      var nick = document.getElementById('restaurant-nick-input').value.trim();
      if (!name) {
        document.getElementById('restaurant-name-input').style.borderColor = '#D97757';
        return;
      }
      document.getElementById('restaurant-name-input').style.borderColor = '';
      submitRestaurant(name, nick || '匿名用户');
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeRestaurantModal();
    });

    async function submitRestaurant(name, nick) {
      var typeCode = window.currentRestaurantType;
      if (!typeCode || typeof typeCode !== 'string') return;
      if (!name) return;

      var settings = window.restaurantSettings || { maxPerType: 5 };
      var max = settings.maxPerType || 5;

      // Get current restaurants from localStorage or rest array
      var stored = null;
      try { stored = JSON.parse(localStorage.getItem('fbti_restaurants') || 'null'); } catch(e) {
        console.warn('[FBTI] localStorage parse failed:', e);
      }
      var rest = (stored && typeof stored === 'object') ? stored : {};
      if (!Array.isArray(rest[typeCode])) rest[typeCode] = [];

      if (rest[typeCode].length >= max) {
        showToast('该类型已达推荐上限');
        closeRestaurantModal();
        return;
      }

      var today = new Date();
      var dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

      var newEntry = { name: name, by: nick, date: dateStr };
      rest[typeCode].push(newEntry);

      try {
        localStorage.setItem('fbti_restaurants', JSON.stringify(rest));
      } catch(e) {
        showToast('保存失败，请清理浏览器存储空间');
        return;
      }
      showToast('推荐已添加 ✓');

      closeRestaurantModal();

      // Re-render restaurant section
      var container = document.getElementById('restaurant-section-container');
      if (container && typeof renderRestaurantSection === 'function') {
        container.innerHTML = '';
        renderRestaurantSection(container, typeCode, rest[typeCode] || []);
      }

      // Trigger JSON download for manual deploy
      downloadRestaurantsJson(rest);
    }

    function downloadRestaurantsJson(rest) {
      var blob = new Blob([JSON.stringify(rest, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'restaurants.json';
      a.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(function() { toast.classList.remove('visible'); }, 2000);
    }
  </script>
</body>
