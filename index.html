<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBT Intelligence Quiz</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* CSS Custom Properties (Design Tokens) */
    :root {
      /* Colors */
      --color-bg-base: #ECE9E0;
      --color-bg-raised: #F5F3EC;
      --color-bg-inverted: #141413;
      --color-accent: #D97757;
      --color-text-primary: #141413;
      --color-text-secondary: #6B6860;
      --color-border: #D8D5CC;

      /* Typography */
      --font-display: 'Lora', serif;
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Lora', serif;

      /* Spacing */
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-16: 64px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      /* Transitions */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-default: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Base Body Styles */
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    /* Screen Classes */
    .screen {
      display: none;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* Buttons */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-default), box-shadow var(--duration-fast) var(--ease-default);
    }
    .btn-primary:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 8px 24px rgba(217,119,87,0.25);
    }
    .btn-primary:active {
      transform: scale(0.99);
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-accent);
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid var(--color-accent);
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast);
    }
    .btn-secondary:hover {
      background: rgba(217,119,87,0.06);
      transform: translateY(-1px);
    }

    /* Option Cards */
    .option-card {
      display: flex;
      align-items: flex-start;
      background: var(--color-bg-raised);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: border-color var(--duration-normal), transform var(--duration-fast), box-shadow var(--duration-fast);
      margin-bottom: 12px;
    }
    .option-card:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 16px rgba(20,20,19,0.08);
    }
    .option-card.selected {
      border-left-color: var(--color-accent);
      background: rgba(217,119,87,0.06);
    }
    .option-letter {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .option-text {
      font-family: var(--font-heading);
      font-weight: 500;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.5;
    }

    /* Progress Bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-10);
    }
    .progress-track {
      flex: 1;
      width: 100%;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--color-accent);
      border-radius: var(--radius-full);
      transition: width var(--duration-normal);
    }
    .progress-label {
      font-family: var(--font-heading);
      font-size: 14px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--duration-normal), transform var(--duration-normal);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp var(--duration-slow) var(--ease-default) forwards;
    }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 80ms; }
    .stagger-3 { animation-delay: 160ms; }
    .stagger-4 { animation-delay: 240ms; }
    .stagger-5 { animation-delay: 320ms; }
    .stagger-6 { animation-delay: 400ms; }

    /* Screen backgrounds */
    #screen-welcome,
    #screen-quiz {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(217,119,87,0.06) 0%, transparent 60%),
        var(--color-bg-base);
    }
    #screen-result {
      background: var(--color-bg-inverted);
      color: white;
    }

    /* === QUIZ SCREEN === */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-16) 0;
    }
    .quiz-header {
      margin-bottom: var(--space-10);
    }
    .quiz-question-text {
      font-family: var(--font-body);
      font-size: 20px;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-8);
    }
    .quiz-options { display: flex; flex-direction: column; }

    /* Question transition */
    #screen-quiz { overflow-x: hidden; }
    .quiz-panel {
      transition: transform var(--duration-normal) var(--ease-default),
                  opacity var(--duration-normal);
    }
    .quiz-panel.exit-left {
      transform: translateX(-40px);
      opacity: 0;
    }
    .quiz-panel.enter-right {
      transform: translateX(40px);
      opacity: 0;
    }
    .quiz-panel.enter-center {
      transform: translateX(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <section id="screen-welcome" class="screen active">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
      <div class="fade-in-up stagger-1">
        <img src="assets/FBTI_logo.svg" alt="FBTI Logo" width="80" height="80">
      </div>
      <h1 class="fade-in-up stagger-2" style="font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-4); line-height: 1.2;">口味人格测试</h1>
      <p class="fade-in-up stagger-3" style="font-family: var(--font-heading); font-size: 16px; color: var(--color-text-secondary); margin-bottom: var(--space-10); max-width: 360px; line-height: 1.6;">16道情景题 · 发现你的味觉人格</p>
      <button id="btn-start" class="btn-primary fade-in-up stagger-4" style="max-width: 320px;">开始测试</button>
    </div>
  </section>
  <section id="screen-quiz" class="screen">
    <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="quiz-wrap">
        <div class="quiz-header fade-in-up stagger-1">
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <span class="progress-label" id="progress-label">1 / 16</span>
          </div>
          <p class="quiz-question-text" id="question-text">题目加载中…</p>
        </div>
        <div class="quiz-options" id="quiz-options">
          <!-- Options populated by JS -->
        </div>
      </div>
    </div>
  </section>
  <section id="screen-result" class="screen"></section>

  <!-- Placeholder script for later -->
  <script>
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    document.getElementById('btn-start').addEventListener('click', function() {
      showScreen('quiz');
      showQuestion(0);
    });

    let currentQuestion = 0;
    let answers = [];

    // Placeholder — will be replaced with full questions in Task 5
    const questions = [
      { text: '题目加载中…', options: ['选项A', '选项B', '选项C', '选项D'] }
    ];

    function showQuestion(index) {
      const q = questions[index];
      const total = questions.length;

      // Update progress
      document.getElementById('progress-fill').style.width = ((index) / total * 100) + '%';
      document.getElementById('progress-label').textContent = (index + 1) + ' / ' + total;

      // Update question text
      const questionText = document.getElementById('question-text');
      questionText.textContent = q.text;

      // Render options
      const optionsEl = document.getElementById('quiz-options');
      optionsEl.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach(function(opt, i) {
        const card = document.createElement('div');
        card.className = 'option-card fade-in-up';
        card.style.animationDelay = (i * 80) + 'ms';
        card.innerHTML = '<span class="option-letter">' + letters[i] + '.</span><span class="option-text">' + opt + '</span>';
        card.addEventListener('click', function() { selectOption(index, letters[i]); });
        optionsEl.appendChild(card);
      });
    }

    function selectOption(questionIndex, letter) {
      answers[questionIndex] = letter;
      if (questionIndex < questions.length - 1) {
        // Transition to next question
        const panel = document.querySelector('#screen-quiz .quiz-wrap');
        panel.classList.add('exit-left');
        setTimeout(function() {
          showQuestion(questionIndex + 1);
          panel.classList.remove('exit-left');
          panel.classList.add('enter-center');
          setTimeout(function() { panel.classList.remove('enter-center'); }, 300);
        }, 200);
      } else {
        // Last question — show result
        showResult();
      }
    }

    function showResult() {
      alert('Quiz complete! (Result screen comes in Task 7)');
    }
  </script>
</body>
</html>
