<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBT Intelligence Quiz</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Google Fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* CSS Custom Properties (Design Tokens) */
    :root {
      /* Colors */
      --color-bg-base: #ECE9E0;
      --color-bg-raised: #F5F3EC;
      --color-bg-inverted: #141413;
      --color-accent: #D97757;
      --color-text-primary: #141413;
      --color-text-secondary: #6B6860;
      --color-border: #D8D5CC;

      /* Typography */
      --font-display: 'Lora', serif;
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Lora', serif;

      /* Spacing */
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-16: 64px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      /* Transitions */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-default: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Base Body Styles */
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    /* Screen Classes */
    .screen {
      display: none;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Layout */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* Buttons */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-default), box-shadow var(--duration-fast) var(--ease-default);
    }
    .btn-primary:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 8px 24px rgba(217,119,87,0.25);
    }
    .btn-primary:active {
      transform: scale(0.99);
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-accent);
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid var(--color-accent);
      border-radius: var(--radius-lg);
      padding: 16px 24px;
      cursor: pointer;
      transition: transform var(--duration-fast);
    }
    .btn-secondary:hover {
      background: rgba(217,119,87,0.06);
      transform: translateY(-1px);
    }

    /* Option Cards */
    .option-card {
      display: flex;
      align-items: flex-start;
      background: var(--color-bg-raised);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: border-color var(--duration-normal), transform var(--duration-fast), box-shadow var(--duration-fast);
      margin-bottom: 12px;
    }
    .option-card:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 16px rgba(20,20,19,0.08);
    }
    .option-card.selected {
      border-left-color: var(--color-accent);
      background: rgba(217,119,87,0.06);
    }
    .option-letter {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .option-text {
      font-family: var(--font-heading);
      font-weight: 500;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 1.5;
    }

    /* Progress Bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-10);
    }
    .progress-track {
      flex: 1;
      width: 100%;
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--color-accent);
      border-radius: var(--radius-full);
      transition: width var(--duration-normal);
    }
    .progress-label {
      font-family: var(--font-heading);
      font-size: 14px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: var(--space-6);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--color-accent);
      color: white;
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--duration-normal), transform var(--duration-normal);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      opacity: 0;
      animation: fadeInUp var(--duration-slow) var(--ease-default) forwards;
    }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 80ms; }
    .stagger-3 { animation-delay: 160ms; }
    .stagger-4 { animation-delay: 240ms; }
    .stagger-5 { animation-delay: 320ms; }
    .stagger-6 { animation-delay: 400ms; }

    /* Screen backgrounds */
    #screen-welcome,
    #screen-quiz {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(217,119,87,0.06) 0%, transparent 60%),
        var(--color-bg-base);
    }
    #screen-result {
      background: var(--color-bg-inverted);
      color: white;
    }

    /* === QUIZ SCREEN === */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-16) 0;
    }
    .quiz-header {
      margin-bottom: var(--space-10);
    }
    .quiz-question-text {
      font-family: var(--font-body);
      font-size: 20px;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-8);
    }
    .quiz-options { display: flex; flex-direction: column; }

    /* Question transition */
    #screen-quiz { overflow-x: hidden; }
    .quiz-panel {
      transition: transform var(--duration-normal) var(--ease-default),
                  opacity var(--duration-normal);
    }
    .quiz-panel.exit-left {
      transform: translateX(-40px);
      opacity: 0;
    }
    .quiz-panel.enter-right {
      transform: translateX(40px);
      opacity: 0;
    }
    .quiz-panel.enter-center {
      transform: translateX(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <section id="screen-welcome" class="screen active">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
      <div class="fade-in-up stagger-1">
        <img src="assets/FBTI_logo.svg" alt="FBTI Logo" width="80" height="80">
      </div>
      <h1 class="fade-in-up stagger-2" style="font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-4); line-height: 1.2;">口味人格测试</h1>
      <p class="fade-in-up stagger-3" style="font-family: var(--font-heading); font-size: 16px; color: var(--color-text-secondary); margin-bottom: var(--space-10); max-width: 360px; line-height: 1.6;">16道情景题 · 发现你的味觉人格</p>
      <button id="btn-start" class="btn-primary fade-in-up stagger-4" style="max-width: 320px;">开始测试</button>
    </div>
  </section>
  <section id="screen-quiz" class="screen">
    <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="quiz-wrap">
        <div class="quiz-header fade-in-up stagger-1">
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <span class="progress-label" id="progress-label">1 / 16</span>
          </div>
          <p class="quiz-question-text" id="question-text">题目加载中…</p>
        </div>
        <div class="quiz-options" id="quiz-options">
          <!-- Options populated by JS -->
        </div>
      </div>
    </div>
  </section>
  <section id="screen-result" class="screen">
  <div class="container" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:var(--space-16);padding-bottom:var(--space-16);">
    <div id="result-avatar"></div>
    <div id="result-type-code"></div>
    <div id="result-name"></div>
    <div id="result-tagline"></div>
  </div>
</section>

  <!-- Placeholder script for later -->
  <script>
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    document.getElementById('btn-start').addEventListener('click', function() {
      showScreen('quiz');
      showQuestion(0);
    });

    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var urlType = urlParams.get('type');
      if (urlType && typeData[urlType]) {
        showScreen('result');
        renderResult(urlType);
      } else {
        showScreen('welcome');
      }
    });

    let currentQuestion = 0;
    let answers = [];

    const questions = [
      { text: '一碗刚出锅的红油抄手端上来，你的第一注意力落在哪里？', options: ['那层亮红色的辣椒油和漂浮的芝麻，已经自动分泌口水了', '先把辣椒拨开一点，看看里面的肉馅和汤底清不清', '我更关心抄手皮是薄是厚、是软是脆', '我会先闻味道，判断这是单纯的辣还是有花椒、香料等复合香气'] },
      { text: '吃火锅调蘸料时，你的碗里通常是什么画风？', options: ['小米辣、蒜泥、香油、蚝油、香菜葱花都要堆满', '酱油底，最多加一点点辣椒圈提味', '芝麻酱+腐乳+韭菜花，或沙茶酱+蛋黄，不太放辣椒', '看锅底决定，牛油锅就蘸干碟，清汤锅就蘸海鲜汁'] },
      { text: '当你看到菜单上有"魔鬼辣挑战成功免单"的活动时，你的想法是？', options: ['让我来，这是我的主场', '除非朋友起哄，否则我不想折磨自己', '我觉得会影响品尝食物本身的味道，不参加', '先研究一下辣椒品种，如果是纯工业辣精就不玩，天然辣椒可以试试'] },
      { text: '吃完一顿重辣餐后，你的身体通常是什么反应？', options: ['嘴巴肿了但心里爽了，第二天继续', '肠胃可能会抗议，我尽量控制频率', '我会大量喝水，并且下一顿一定要吃清淡的缓一缓', '看辣椒品质，好辣椒只辣嘴不烧心，坏辣椒会让我难受很久'] },
      { text: '一份炸鸡摆在面前，哪个瞬间让你觉得"这顿值了"？', options: ['牙齿咬下去发出"咔嚓"声，脆皮碎屑掉下来', '里面的肉汁瞬间烫到舌头，肉质嫩滑到不用怎么嚼', '我喜欢先吃皮再吃肉，皮必须脆，肉可以稍干', '我其实不爱油炸，我更爱红烧或炖煮的口感'] },
      { text: '如果一碗红烧肉让你评价，你觉得最不能忍受的缺点是？', options: ['瘦肉部分太柴，塞牙', '肥肉部分没有炖烂，咬起来像肥油块', '皮上的毛没去干净', '汤汁不够浓稠，挂不住肉'] },
      { text: '你对"软糯"类食物（如土豆泥、年糕、烩饭）的态度是？', options: ['可以吃，但不能连续吃，否则觉得嘴巴没劲', '这是我的舒适区，我可以天天吃软软的东西', '看搭配，如果是软糯主食配脆的小菜，我就很爱', '我更关心调味，软或硬没那么重要'] },
      { text: '吃拉面时，你对"面条硬度"的选择通常是？', options: ['必须点"超硬"或"硬"，喜欢吃有嚼劲的', '点"普通"或"偏软"，好嚼好消化', '第一次去会点普通，之后再根据汤头调整', '我不吃拉面，或者我不关心这个细节'] },
      { text: '去一家没去过的异国餐厅，菜单上有一道"香菜菠萝披萨"和一道"玛格丽特披萨"，你会？', options: ['绝对点香菜菠萝的，没吃过的东西才有意思', '保险起见点玛格丽特，不踩雷最重要', '先问服务员哪个是招牌，如果是香菜菠萝就试，如果不是就点玛格丽特', '我都不点，我会找菜单上看起来最熟悉的肉菜'] },
      { text: '朋友向你安利一家"用巧克力蘸辣椒面吃"的店，你的第一反应是？', options: ['听起来很暗黑，但我必须去验证一下', '谢谢，这搭配超出了我的认知范围，我不去', '如果是黑巧克力我可能考虑，牛奶巧克力就算了', '我要先看看大众点评上的图片再决定'] },
      { text: '你对"正宗"这个词的态度是？', options: ['正宗很重要，那是文化和风味的根基', '好吃就行，我不在乎正不正宗，改良得好我也爱', '有些菜必须正宗（比如我妈做的），有些菜可以乱来', '我分不清什么是正宗，只要对胃口就是好菜'] },
      { text: '在自助餐厅，你的取餐策略通常是？', options: ['每样没见过的都拿一点点尝尝', '直奔我最爱吃的那几样，拿满一盘吃到爽', '第一轮拿熟悉的，第二轮再探索新菜', '看排队人数，人多的一定好吃，先拿那个'] },
      { text: '你觉得一碗"清汤寡水"的阳春面（只有酱油汤底和葱花）最大的问题是什么？', options: ['不够鲜，需要加一勺猪油或者高汤料包', '没有浇头，吃起来太单调', '其实我觉得挺好吃的，能吃到面粉的香气', '面条本身的口感比汤更重要'] },
      { text: '对于"味精/鸡精/蚝油"这类调味品，你的态度是？', options: ['做饭必备，少了它们菜就没有灵魂', '能不放就不放，我更喜欢食材本身的味道', '在外面吃无所谓，自己在家做会尽量少放', '我吃不出来区别'] },
      { text: '吃日料刺身时，你会怎么蘸酱油？', options: ['酱油里一定会加现磨山葵，还要蘸很多下', '轻轻蘸一点酱油，甚至有的鱼不蘸直接吃', '我其实不太吃生鱼片，觉得腥', '我会把山葵直接融进酱油里搅浑了蘸'] },
      { text: '你觉得"老火靓汤"和"生滚汤"哪个更对你胃口？', options: ['老火靓汤，那口浓郁鲜甜是时间的味道', '生滚汤，清清爽爽，食材新鲜就好', '看季节，冬天老火汤夏天生滚汤', '我不怎么喝汤'] }
    ];

    const typeData = {
      SCNU: { name: '烈焰暴君', tagline: '人类味觉边疆的拓荒者', desc: '此类型是人类味觉边疆的拓荒者。追求极致的复合型感官轰炸——必须辣到流汗、脆到出声、鲜到掉眉毛。他们热衷于寻找"变态辣脆皮肥肠"或"烟熏辣椒巧克力脆片"。推荐信源可信度极高，但普通人跟上需要勇气。避雷区：清蒸、白灼、汤羹类食物。W型人的软烂推荐对他们来说如同"婴儿辅食"。' },
      SCNP: { name: '硬核极客', tagline: '追求纯粹的化学刺激与物理脆度', desc: '他们追求纯粹的化学刺激与物理脆度，但对"鲜"非常苛刻，讨厌味精感和过度的发酵味。他们可能爱吃"死神辣椒薯片"但极度厌恶鸡精。他们推荐的辣馆子通常"干净利落、辣得纯粹"。避雷区：浓汤宝、松露油、老火靓汤。' },
      SCTU: { name: '江湖老饕', tagline: '地方菜系的坚定捍卫者', desc: '地方菜系的坚定捍卫者。只认可"正宗"的辣脆结合，比如重庆火锅里的毛肚黄喉、湖南小炒里的脆骨。拒绝为了猎奇而改良的融合菜。他们对特定菜系的推荐具有权威性。避雷区：任何"新派"或"分子料理"版本的家乡菜。' },
      SCTP: { name: '盐系刺客', tagline: '纯粹的重口味盐分爱好者', desc: '纯粹的重口味盐分爱好者。比起鲜，更爱直接的咸辣。他们热爱的是夜市里的"疯狂烤翅"、校门口的"油炸淀粉肠"。他们对环境不挑，只看"味道够不够劲儿"。避雷区：精致日料、需要细品的本味食材。' },
      SWNU: { name: '熔岩核心', tagline: '渴望"内在的燃烧"', desc: '这种类型渴望"内在的燃烧"。他们最爱的食物是：炖得软烂入味的辣卤鸡爪、入口即化的水煮脑花、吸饱汤汁的臭豆腐。追求辣与鲜在绵密口感中的缓慢释放。避雷区：沙拉、干煎、任何需要用力咀嚼的食物。' },
      SWNP: { name: '味蕾实验员', tagline: '喜欢新奇辣味带来的趣味性', desc: '他们可能为了尝试"辣椒冰淇淋"而去排队，或者喜欢吃"软糯的韩式辣年糕"。他们喜欢新奇辣味带来的趣味性，但不希望菜里有"药膳味"或"高汤味"。避雷区：药材炖汤、浓郁菌菇锅底。' },
      SWTU: { name: '红汤居士', tagline: '软烂入味的辣味是归宿', desc: '四川火锅里的"耙牛肉"、湖南的"口味虾"汤汁拌饭是他们的归宿。他们是那种会因为一道"老妈蹄花汤不够软烂"而给差评的人。他们对"软"和"辣"的比例有严格的审美标准。避雷区：西式牛排、生硬的沙拉菜。' },
      SWTP: { name: '刺激渴求者', tagline: '吃辣只是为了爽，为了多巴胺', desc: '他们吃辣只是为了爽，为了多巴胺。最喜欢的食物是：软糯的麻辣烫宽粉、吸满辣椒油的凉皮。对于食材本身是否高级、是否有鲜味不感兴趣。避雷区：价格昂贵但辣度不足的餐厅。' },
      MCNU: { name: '风味猎人', tagline: '不辣但追求极高风味浓度', desc: '完全不吃辣，但追求极高风味浓度。他们热爱焦脆的芝士脆皮、美拉德反应极致的煎烤、复杂的香料组合（不含辣）。推荐非辣菜系的异国料理极准。避雷区：白水煮菜、寡淡的减肥餐。' },

    function showQuestion(index) {
      const q = questions[index];
      const total = questions.length;

      // Update progress
      document.getElementById('progress-fill').style.width = ((index) / total * 100) + '%';
      document.getElementById('progress-label').textContent = (index + 1) + ' / ' + total;

      // Update question text
      const questionText = document.getElementById('question-text');
      questionText.textContent = q.text;

      // Render options
      const optionsEl = document.getElementById('quiz-options');
      optionsEl.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach(function(opt, i) {
        const card = document.createElement('div');
        card.className = 'option-card fade-in-up';
        card.style.animationDelay = (i * 80) + 'ms';
        card.innerHTML = '<span class="option-letter">' + letters[i] + '.</span><span class="option-text">' + opt + '</span>';
        card.addEventListener('click', function() { selectOption(index, letters[i]); });
        optionsEl.appendChild(card);
      });
    }

    function selectOption(questionIndex, letter) {
      answers[questionIndex] = letter;
      if (questionIndex < questions.length - 1) {
        // Transition to next question
        const panel = document.querySelector('#screen-quiz .quiz-wrap');
        panel.classList.add('exit-left');
        setTimeout(function() {
          showQuestion(questionIndex + 1);
          panel.classList.remove('exit-left');
          panel.classList.add('enter-center');
          setTimeout(function() { panel.classList.remove('enter-center'); }, 300);
        }, 200);
      } else {
        // Last question — show result
        showResult();
      }
    }

    function calculateType(answers) {
      // Dim1 S/M (Q1-Q4, indices 0-3): A=+1, D=+0.5, B/C=+0 → S if score >= 2.5, else M
      var dim1 = 0;
      for (var i = 0; i <= 3; i++) {
        if (answers[i] === 'A') dim1 += 1;
        else if (answers[i] === 'D') dim1 += 0.5;
      }
      var d1 = dim1 >= 2.5 ? 'S' : 'M';

      // Dim2 C/W (Q5-Q8, indices 4-7): A/C=+1, B=-0.5 (Q5 weight applies), D=0 → C if score >= 2.5, else W
      var dim2 = 0;
      for (var i = 4; i <= 7; i++) {
        if (answers[i] === 'A' || answers[i] === 'C') dim2 += 1;
        else if (answers[i] === 'B') dim2 -= 0.5;
      }
      var d2 = dim2 >= 2.5 ? 'C' : 'W';

      // Dim3 N/T (Q9-Q12, indices 8-11): A=+1, B=-1, C/D=0 → N if score >= 1, else T
      var dim3 = 0;
      for (var i = 8; i <= 11; i++) {
        if (answers[i] === 'A') dim3 += 1;
        else if (answers[i] === 'B') dim3 -= 1;
      }
      var d3 = dim3 >= 1 ? 'N' : 'T';

      // Dim4 U/P (Q13-Q16, indices 12-15): A=+1, B=-1, C/D=0 → U if score >= 1, else P
      var dim4 = 0;
      for (var i = 12; i <= 15; i++) {
        if (answers[i] === 'A') dim4 += 1;
        else if (answers[i] === 'B') dim4 -= 1;
      }
      var d4 = dim4 >= 1 ? 'U' : 'P';

      return d1 + d2 + d3 + d4;
    }

    function showResult() {
      var typeCode = calculateType(answers);
      showScreen('result');
      renderResult(typeCode);
    }

    function renderResult(typeCode) {
      var data = typeData[typeCode];
      if (!data) {
        showScreen('quiz');
        return;
      }
      var typeEl = document.getElementById('result-type-code');
      var nameEl = document.getElementById('result-name');
      var taglineEl = document.getElementById('result-tagline');
      var avatarEl = document.getElementById('result-avatar');
      if (typeEl) typeEl.textContent = typeCode;
      if (nameEl) nameEl.textContent = data.name;
      if (taglineEl) taglineEl.textContent = data.tagline;
      if (avatarEl) avatarEl.innerHTML = typeSVGs[typeCode] || '';
      // Push URL
      var url = new URL(window.location.href);
      url.searchParams.set('type', typeCode);
      window.history.pushState({ type: typeCode }, '', url.toString());
    }
